version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: poultryflow_db
    environment:
      POSTGRES_USER: poultryflow
      POSTGRES_PASSWORD: poultryflow
      POSTGRES_DB: poultryflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poultryflow -d poultryflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: poultryflow_api
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    environment:
      - DATABASE_URL=postgresql://poultryflow:poultryflow@db:5432/poultryflow
      - SECRET_KEY=default_insecure_secret_key_change_in_production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
